# =============================================================================
# Zammad MCP Server - Local Development Stack
# =============================================================================
# Usage:  docker compose -f docker-compose.development.yml up -d --build
#
# - Exposes ${ZAMMAD_MCP_PORT} directly (no reverse proxy)
# - LOG_FORMAT=console / AUTH_MODE=none permitted (dev only)
# - Spin up a Zammad instance separately, or point ZAMMAD_URL at a remote one
# =============================================================================

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "3"

services:
  zammad-mcp:
    build:
      context: ./app/bg-zammad-mcp
      target: production
    image: ${ZAMMAD_MCP_IMAGE:-ghcr.io/bauer-group/ip-zammad-mcpserver/bg-zammad-mcp}:${ZAMMAD_MCP_VERSION:-latest}
    container_name: ${STACK_NAME:-bg-zammad-mcp}
    hostname: ${STACK_NAME:-bg-zammad-mcp}
    restart: unless-stopped
    <<: *logging

    environment:
      TZ: ${TIME_ZONE:-Etc/UTC}

      ENVIRONMENT: ${ENVIRONMENT:-development}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}

      MCP_TRANSPORT: ${MCP_TRANSPORT:-streamable-http}
      MCP_HOST: ${MCP_HOST:-}
      MCP_PORT: ${MCP_PORT:-8000}

      MCP_DISPLAY_NAME: ${MCP_DISPLAY_NAME:-BAUER GROUP Zammad}
      MCP_ICON_URL: ${MCP_ICON_URL:-}
      MCP_WEBSITE_URL: ${MCP_WEBSITE_URL:-https://go.bauer-group.com/mcp-server}

      LOG_FORMAT: ${LOG_FORMAT:-console}
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}

      ZAMMAD_URL: ${ZAMMAD_URL:?ZAMMAD_URL is required}
      ZAMMAD_API_TOKEN: ${ZAMMAD_API_TOKEN:-}
      ZAMMAD_HTTP_TIMEOUT: ${ZAMMAD_HTTP_TIMEOUT:-30}
      ZAMMAD_VERIFY_TLS: ${ZAMMAD_VERIFY_TLS:-true}

      AUTH_MODE: ${AUTH_MODE:-none}
      AUTH_JWT_SIGNING_KEY: ${AUTH_JWT_SIGNING_KEY:-dev-only-do-not-use-in-production-deadbeef00000000000000000000000000}
      AUTH_REDIS_URL: ${AUTH_REDIS_URL:-}
      AUTH_STORAGE_ENCRYPTION_KEY: ${AUTH_STORAGE_ENCRYPTION_KEY:-}
      AUTH_DISK_STORAGE_PATH: ${AUTH_DISK_STORAGE_PATH:-/app/data/oauth-storage}

      ZAMMAD_OAUTH_CLIENT_ID: ${ZAMMAD_OAUTH_CLIENT_ID:-}
      ZAMMAD_OAUTH_CLIENT_SECRET: ${ZAMMAD_OAUTH_CLIENT_SECRET:-}
      ZAMMAD_OAUTH_SCOPES: ${ZAMMAD_OAUTH_SCOPES:-read write}
      ZAMMAD_OAUTH_AUTHORIZE_PATH: ${ZAMMAD_OAUTH_AUTHORIZE_PATH:-/oauth/authorize}
      ZAMMAD_OAUTH_TOKEN_PATH: ${ZAMMAD_OAUTH_TOKEN_PATH:-/oauth/token}
      ZAMMAD_USERINFO_PATH: ${ZAMMAD_USERINFO_PATH:-/api/v1/users/me}

      OIDC_DISCOVERY_URL: ${OIDC_DISCOVERY_URL:-}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_AUTH_URI: ${OIDC_AUTH_URI:-}
      OIDC_TOKEN_URI: ${OIDC_TOKEN_URI:-}
      OIDC_JWKS_URI: ${OIDC_JWKS_URI:-}
      OIDC_USERINFO_URI: ${OIDC_USERINFO_URI:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_SCOPES: ${OIDC_SCOPES:-openid profile email}

      MCP_ALLOWED_ROLES: ${MCP_ALLOWED_ROLES:-Admin,Agent}
      MCP_ROLE_CHECK_AUDIT_ONLY: ${MCP_ROLE_CHECK_AUDIT_ONLY:-false}
      MCP_ROLE_CACHE_TTL_SECONDS: ${MCP_ROLE_CACHE_TTL_SECONDS:-60}

      RATE_LIMITER_ENABLED: ${RATE_LIMITER_ENABLED:-false}
      RATE_LIMITER_MAX_REQUESTS_PER_SECOND: ${RATE_LIMITER_MAX_REQUESTS_PER_SECOND:-10}
      RATE_LIMITER_BURST_CAPACITY: ${RATE_LIMITER_BURST_CAPACITY:-20}
      RATE_LIMITER_GLOBAL: ${RATE_LIMITER_GLOBAL:-false}
      RATE_LIMITER_TRUSTED_PROXY_HOPS: ${RATE_LIMITER_TRUSTED_PROXY_HOPS:-0}

      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-development}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.05}

    expose:
      - ${MCP_PORT:-8000}

    ports:
      - "${ZAMMAD_MCP_PORT:-8000}:${MCP_PORT:-8000}"

    depends_on:
      redis:
        condition: service_healthy

    networks:
      - local

    # Persistent OAuth state for the disk-storage fallback (when AUTH_REDIS_URL
    # is empty). Without this volume mount, every container restart wipes
    # DCR client registrations + upstream Zammad tokens.
    volumes:
      - oauth-data:/app/data/oauth-storage

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:${MCP_PORT:-8000}/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s


  # Redis is included even in dev so the OAuth client store works the same as prod.
  # Set AUTH_REDIS_URL=redis://redis:6379/0 to enable it.
  redis:
    image: ${REDIS_IMAGE:-redis}:${REDIS_VERSION:-8-alpine}
    container_name: ${STACK_NAME:-bg-zammad-mcp}-redis
    restart: unless-stopped
    <<: *logging
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - ${REDIS_MAXMEMORY:-128mb}
      - --maxmemory-policy
      - noeviction
    mem_limit: ${REDIS_CONTAINER_MEM_LIMIT:-192m}
    expose:
      - 6379
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - local
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5


volumes:
  redis-data:
    driver: local
    name: ${STACK_NAME:-bg-zammad-mcp}-redis
  oauth-data:
    driver: local
    name: ${STACK_NAME:-bg-zammad-mcp}-oauth


networks:
  local:
    driver: bridge
    name: ${STACK_NAME:-bg-zammad-mcp}
    enable_ipv6: true
