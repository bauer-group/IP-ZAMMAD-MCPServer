# =============================================================================
# Zammad MCP Server — Coolify Deployment
# =============================================================================
# Designed for Coolify's Docker Compose buildpack. Coolify auto-handles:
#   * container + volume naming (UUID-suffixed for project isolation)
#   * the `coolify.managed`, `coolify.applicationId`, `coolify.type` labels
#   * Traefik routing via the SERVICE_FQDN_* magic variable + `expose:` port
#   * SSL provisioning (Let's Encrypt / custom cert via the Coolify UI)
#
# Note: services attach to Coolify's UUID-named resource network automatically.
# Adding a custom `networks:` block here would cause Traefik routing
# ambiguity (504 Gateway Timeout) - that block is intentionally absent.
#
# Operator workflow (Coolify UI):
#   1. Set the domain in the application's "Domains" field
#      -> SERVICE_FQDN_ZAMMADMCP is auto-populated, Traefik is wired
#   2. Set the pre-shared / external secrets in "Environment Variables":
#      ZAMMAD_URL, ZAMMAD_OAUTH_CLIENT_ID, ZAMMAD_OAUTH_CLIENT_SECRET, ...
#   3. Crypto material (JWT signing key, storage encryption key) is
#      auto-generated by Coolify on first deploy and persisted in its DB.
#   4. Deploy.
# =============================================================================

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "3"

services:
  zammad-mcp:
    image: ${ZAMMAD_MCP_IMAGE:-ghcr.io/bauer-group/ip-zammad-mcpserver/bg-zammad-mcp}:${ZAMMAD_MCP_VERSION:-latest}
    # Force a registry roundtrip on every redeploy so moving tags like :latest
    # / :stable / :0.1 actually refresh — Compose's default `missing` policy
    # otherwise reuses the locally cached image indefinitely once it exists.
    pull_policy: always
    restart: unless-stopped
    <<: *logging

    environment:
      TZ: ${TIME_ZONE:-Etc/UTC}

      ENVIRONMENT: ${ENVIRONMENT:-production}

      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:?PUBLIC_BASE_URL is required}

      MCP_TRANSPORT: ${MCP_TRANSPORT:-streamable-http}
      MCP_HOST: ${MCP_HOST:-}
      MCP_PORT: ${MCP_PORT:-8000}

      MCP_DISPLAY_NAME: ${MCP_DISPLAY_NAME:-BAUER GROUP Zammad}
      MCP_ICON_URL: ${MCP_ICON_URL:-}
      MCP_WEBSITE_URL: ${MCP_WEBSITE_URL:-https://go.bauer-group.com/mcp-server}

      LOG_FORMAT: ${LOG_FORMAT:-json}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

      ZAMMAD_URL: ${ZAMMAD_URL:?ZAMMAD_URL is required}
      ZAMMAD_API_TOKEN: ${ZAMMAD_API_TOKEN:-}
      ZAMMAD_HTTP_TIMEOUT: ${ZAMMAD_HTTP_TIMEOUT:-30}
      ZAMMAD_VERIFY_TLS: ${ZAMMAD_VERIFY_TLS:-true}

      AUTH_MODE: ${AUTH_MODE:?AUTH_MODE is required}
      AUTH_JWT_SIGNING_KEY: ${AUTH_JWT_SIGNING_KEY:?AUTH_JWT_SIGNING_KEY is required}
      AUTH_STORAGE_ENCRYPTION_KEY: ${AUTH_STORAGE_ENCRYPTION_KEY:?AUTH_STORAGE_ENCRYPTION_KEY is required}
      AUTH_REDIS_URL: ${AUTH_REDIS_URL:-redis://redis:6379/0}
      AUTH_DISK_STORAGE_PATH: ${AUTH_DISK_STORAGE_PATH:-/app/data/oauth-storage}

      ZAMMAD_OAUTH_CLIENT_ID: ${ZAMMAD_OAUTH_CLIENT_ID:-}
      ZAMMAD_OAUTH_CLIENT_SECRET: ${ZAMMAD_OAUTH_CLIENT_SECRET:-}
      ZAMMAD_OAUTH_SCOPES: ${ZAMMAD_OAUTH_SCOPES:-read write}
      ZAMMAD_OAUTH_AUTHORIZE_PATH: ${ZAMMAD_OAUTH_AUTHORIZE_PATH:-/oauth/authorize}
      ZAMMAD_OAUTH_TOKEN_PATH: ${ZAMMAD_OAUTH_TOKEN_PATH:-/oauth/token}
      ZAMMAD_USERINFO_PATH: ${ZAMMAD_USERINFO_PATH:-/api/v1/users/me}

      OIDC_DISCOVERY_URL: ${OIDC_DISCOVERY_URL:-}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_AUTH_URI: ${OIDC_AUTH_URI:-}
      OIDC_TOKEN_URI: ${OIDC_TOKEN_URI:-}
      OIDC_JWKS_URI: ${OIDC_JWKS_URI:-}
      OIDC_USERINFO_URI: ${OIDC_USERINFO_URI:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_SCOPES: ${OIDC_SCOPES:-openid profile email}

      MCP_ALLOWED_ROLES: ${MCP_ALLOWED_ROLES:-Admin,Agent}
      MCP_ROLE_CHECK_AUDIT_ONLY: ${MCP_ROLE_CHECK_AUDIT_ONLY:-false}
      MCP_ROLE_CACHE_TTL_SECONDS: ${MCP_ROLE_CACHE_TTL_SECONDS:-60}

      RATE_LIMITER_ENABLED: ${RATE_LIMITER_ENABLED:-true}
      RATE_LIMITER_MAX_REQUESTS_PER_SECOND: ${RATE_LIMITER_MAX_REQUESTS_PER_SECOND:-10}
      RATE_LIMITER_BURST_CAPACITY: ${RATE_LIMITER_BURST_CAPACITY:-20}
      RATE_LIMITER_GLOBAL: ${RATE_LIMITER_GLOBAL:-false}
      RATE_LIMITER_TRUSTED_PROXY_HOPS: ${RATE_LIMITER_TRUSTED_PROXY_HOPS:-1}

      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.05}

    expose:
      - ${MCP_PORT:-8000}

    depends_on:
      redis:
        condition: service_healthy

    volumes:
      - oauth-data:/app/data/oauth-storage

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:${MCP_PORT:-8000}/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s


  redis:
    image: ${REDIS_IMAGE:-redis}:${REDIS_VERSION:-8-alpine}
    restart: unless-stopped
    <<: *logging
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - ${REDIS_MAXMEMORY:-256mb}
      - --maxmemory-policy
      - noeviction
    expose:
      - 6379
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5


volumes:
  redis-data:
    driver: local
    name: bg-zammad-mcp-redis
  oauth-data:
    driver: local
    name: bg-zammad-mcp-oauth
