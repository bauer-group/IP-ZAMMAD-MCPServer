# =============================================================================
# Docker Maintenance — Auto-merge Dependabot PRs (bg-zammad-mcp Dockerfile)
# =============================================================================
# When Dependabot opens a PR bumping the python:3.14-alpine base image inside
# app/bg-zammad-mcp/Dockerfile, this workflow auto-approves and merges it
# (after validation passes), which then triggers docker-release.yml to build
# and push the updated image.
# =============================================================================

name: 🔧 Docker Maintenance

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'app/bg-zammad-mcp/Dockerfile'

permissions:
  contents: write
  pull-requests: write

jobs:
  maintenance:
    name: Auto-merge Dependabot PRs
    uses: bauer-group/automation-templates/.github/workflows/docker-maintenance-dependabot.yml@main
    with:
      merge-method: 'squash'
      auto-approve: true
    secrets: inherit
